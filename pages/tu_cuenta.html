    <main>
        <h2 class="titulo-datos-de-cuenta">DATOS DE CUENTA</h2>
        <form class="tu-cuenta">
            <section class="datos-personales">
            <h2>Datos Personales</h2>
                <label>Nombre:</label>
                <input type="text">

                <label>Apellido:</label>
                <input type="text">

                <input type="text">

            </section>
            <section class="datos-domicilio">

                <label>Direccion:</label>
                <input type="text">

                <input type="text">

                <input type="text">
            </section>
            <section class="datos-persona-autorizada">

                <label>Nombre:</label>
                <input type="text">

                <label>Apellido:</label>

                <input type="text">

                <label>E-mail:</label>
                <input type="text">

                <label>Celular:</label>

            <button type="submit">Guardar</button>
